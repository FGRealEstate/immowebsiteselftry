backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "wissen"
    label: "Investment Lab · Fachartikel"
    folder: "content/wissen"
    create: true
    extension: "json"
    format: "json"
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Kategorie", name: "category", widget: "select", options: ["Kapitalanlage", "Finanzierung", "Steuern", "Immobilienkauf", "Vermietung", "Marktanalysen"] }
      - { label: "Kurzbeschreibung", name: "summary", widget: "text" }
      - { label: "Fachtext", name: "body", widget: "markdown" }
      - { label: "Keywords", name: "keywords", widget: "list", required: false }
      - { label: "Synonyme", name: "synonyms", widget: "list", required: false }
      - { label: "URL", name: "url", widget: "string" }
      - { label: "Aktualisiert", name: "updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
  - name: "lexikon"
    label: "Investment Lab · Lexikon"
    folder: "content/lexikon"
    create: true
    extension: "json"
    format: "json"
    identifier_field: "term"
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Begriff", name: "term", widget: "string" }
      - { label: "Definition", name: "definition", widget: "text" }
      - { label: "Keywords", name: "keywords", widget: "list", required: false }
      - { label: "URL", name: "url", widget: "string" }
  - name: "standorte"
    label: "Investment Lab · Standorte"
    folder: "content/standorte"
    create: true
    extension: "json"
    format: "json"
    identifier_field: "name"
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Standort", name: "name", widget: "string" }
      - { label: "Region", name: "region", widget: "string" }
      - { label: "Kaufpreise", name: "price", widget: "string" }
      - { label: "Mietniveau", name: "rent", widget: "string" }
      - { label: "Rendite", name: "yield", widget: "string" }
      - { label: "Chancen", name: "chance", widget: "text" }
      - { label: "Risiken", name: "risk", widget: "text" }
      - { label: "Infrastruktur", name: "infra", widget: "text" }
      - { label: "Zukunft", name: "future", widget: "text" }
      - { label: "Bevölkerung", name: "population", widget: "text" }
      - { label: "F&G-Einordnung", name: "view", widget: "text" }
      - { label: "URL", name: "url", widget: "string" }
