backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads" # Passt den Pfad für hochgeladene Bilder an
public_folder: "/images/uploads"

collections:
  - name: "immobilien"
    label: "Immobilien"
    # WICHTIG: Sagt dem CMS, dass es Dateien in diesem Ordner speichern soll
    folder: "immobilien"
    create: true
    # Erstellt Dateinamen basierend auf dem 'title'-Feld (z.B. 'neue-wohnung.md')
    slug: "{{title | slugify}}"
    
    fields:
      # Für Eleventy: Wird für die URL-Erstellung verwendet
      - { label: "Titel (für URL)", name: "title", widget: "string", required: true, hint: "Kurzname für die URL (z.B. 'test-wohnung-in-berlin')" }
      
      # Sichtbare Daten
      - { label: "Anzeigetitel", name: "titel", widget: "string", required: true }
      
      # NEU: Unterscheidung Kauf / Miete (Wichtig für Filter!)
      - { label: "Vermarktungsart", name: "vermarktungsart", widget: "select", options: [ "Kauf", "Miete" ], default: "Kauf", required: true }
      
      # NEU: Objektart (Wichtig für Filter!)
      - { label: "Objektart", name: "objektart", widget: "select", options: [ "Wohnung", "Einfamilienhaus", "Mehrfamilienhaus", "Grundstück", "Gewerbe" ], default: "Wohnung", required: true }

      - { label: "Ort", name: "ort", widget: "string", required: true }
      - { label: - { label: "Preis-Anzeige", name: "preis", widget: "string", required: true, hint: "z.B. ab 171.000 € oder 222.000 € - 255.000 €" }
      - { label: "Preiswert für Filter", name: "preis_wert", widget: "number", value_type: "int", required: false, hint: "z.B. 171000" }
      - { label: "Maklercourtage", name: "provision", widget: "string", required: false, hint: "z.B. '3,57 % inkl. MwSt.' oder 'Provisionsfrei'" }
      - { label: "Status", name: "status", widget: "select", options: [ "NEU", "VERKAUFT", "RESERVIERT", "VERMIETET" ], default: "NEU" }

      - { label: "Hauptbild", name: "hauptbild", widget: "image", required: true }
      - label: "Bildergalerie"
        name: "galerie"
        widget: "list"
        summary: "{{fields.bild}}"
        field: { label: "Bild", name: "bild", widget: "image" }
      - { label: "Objektbeschreibung", name: "body", widget: "markdown" }
      
       

      # Eckdaten
      - label: "Eckdaten"
        name: "eckdaten"
        widget: "object"
        fields:
          - { label: "Wohnfläche (m²)", name: "flaeche", widget: "string", required: false, hint: "z.B. 120 m², ca. 85,5 m², 100-120 m²" }
          - { label: "Anzahl Zimmer", name: "zimmer", widget: "string", required: false, hint: "z.B. 3,5, 4 Zimmer, 2-3" }
          - { label: "Baujahr", name: "baujahr", widget: "string", required: false, hint: "z.B. 1998, ca. 1900, unbekannt" }

        #Energiedaten
            - label: "Energieangaben"
        name: "energie"
        widget: "object"
        required: false
        fields:
          - { label: "Energieausweis-Art", name: "ausweis_art", widget: "select", options: ["Bedarfsausweis", "Verbrauchsausweis"], required: false }
          - { label: "Endenergiekennwert", name: "kennwert", widget: "string", required: false, hint: "z.B. 84,54 kWh/(m²·a)" }
          - { label: "Wesentlicher Energieträger", name: "energietraeger", widget: "string", required: false }
          - { label: "Energieeffizienzklasse", name: "effizienzklasse", widget: "string", required: false }
      # Versteckte Felder
      - { label: "Layout", name: "layout", widget: "hidden", default: "immobilien-detail.liquid" }
      - { label: "Permalink", name: "permalink", widget: "hidden", default: "angebote/{{title | slugify}}/index.html" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "immobilien" }
